{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil Aventurero</title>
    <style>
        body {
            background-color: #D1F2F7;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 4px solid #1A73E8;
            box-shadow: 0px 8px 0px #0D47A1;
        }
        h1 { color: #1A73E8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"] {
            width: 80%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #B0BEC5;
            font-size: 1.1rem;
            outline: none;
        }
        
        /* Contenedor Selección de Avatar */
        .avatars-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .avatar-box {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #FFE699;
        }
        .avatar-box img { width: 85%; height: auto; }
        .avatar-box.selected { border: 5px solid #1A73E8; transform: scale(1.05); }

        .btn-guardar {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 0px #1B5E20;
        }
        .btn-cancelar {
            color: #555;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✏️ Modificar Aventurero</h1>

    <form method="POST">
       {% csrf_token %}
        <div class="form-group">
            <label>Nombre de Usuario:</label><br><br>
            <input type="text" name="nombre_usuario" value="{{ perfil.nombre_usuario }}" required>
        </div>
        <div class="form-group"><br>
            <label>Edad:</label><br><br>
            <input type="number" name="edad" value="{{ perfil.edad }}" min="3" max="7" required>
        </div>

        <div class="form-group"><br>
            <label>Cambiar Avatar:</label>
            <div class="avatars-container">
                <div class="avatar-box {% if perfil.avatar == 'avatar1' %}selected{% endif %}" onclick="selectAvatar('avatar1', this)">
                    <img src="{% static 'core/Imagenes/avatar1.png' %}" alt="1">
                </div>
                <div class="avatar-box {% if perfil.avatar == 'avatar2' %}selected{% endif %}" onclick="selectAvatar('avatar2', this)">
                    <img src="{% static 'core/Imagenes/avatar2.png' %}" alt="2">
                </div>
                <div class="avatar-box {% if perfil.avatar == 'avatar3' %}selected{% endif %}" onclick="selectAvatar('avatar3', this)">
                    <img src="{% static 'core/Imagenes/avatar3.png' %}" alt="3">
                </div>
                <div class="avatar-box {% if perfil.avatar == 'avatar4' %}selected{% endif %}" onclick="selectAvatar('avatar4', this)">
                    <img src="{% static 'core/Imagenes/avatar4.png' %}" alt="4">
                </div>
            </div>
        </div>

        <input type="hidden" name="avatar" id="avatar_selected" value="{{ perfil.avatar }}">

        <button type="submit" class="btn-guardar">Guardar Cambios</button>
        <a href="{% url 'area_padres' %}" class="btn-cancelar">Cancelar</a>
    </form>
</div>

<script>
    function selectAvatar(avatarId, element) {
        document.querySelectorAll('.avatar-box').forEach(box => box.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('avatar_selected').value = avatarId;
    }
</script>

</body>
</html>
