{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasitos al Saber - Cargando...</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #E0F7FA; /* Color de respaldo mientras carga la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loading-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .logo-carga {
            width: 100%;
            height: 100vh;
            object-fit: cover; /* Hace que la imagen cubra toda la pantalla adaptándose sin deformarse */
            object-position: center; /* Centra la imagen para que no se corte lo importante */
            display: block;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <img src="{% static 'core/Imagenes/Carga.jpeg' %}" alt="Bienvenido a Pasitos al Saber" class="logo-carga">
    </div>

    <script>
        // Redirección automática configurada a 8 segundos (8000 milisegundos)
        setTimeout(function() {
            window.location.href = "{% url 'crear_perfil' %}";
        }, 5000);
    </script>

</body>
</html>
