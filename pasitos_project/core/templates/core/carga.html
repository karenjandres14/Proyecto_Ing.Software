{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasitos al Saber - Cargando...</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #E0F7FA; /* Color de respaldo mientras carga la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loading-container {
            width: 100%;
            height: 100vh;
            position: relative;
            /* Transición suave para cuando añadamos la clase de salida */
            transition: opacity 0.8s ease-in-out; 
            opacity: 1;
        }
        .logo-carga {
            width: 100%;
            height: 100vh;
            object-fit: cover; 
            object-position: center; 
            display: block;
            /* Aplicamos la animación de pulso/respiración */
            animation: pulsoSuave 6s ease-in-out infinite;
        }

        /* Clase que usaremos con JavaScript para el desvanecimiento final */
        .fade-out {
            opacity: 0;
        }

        /* KEYFRAMES: Animación de zoom muy sutil para que parezca viva */
        @keyframes pulsoSuave {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04); /* Un zoom muy ligero para no romper el diseño */
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="loading-container" id="loader">
        <img src="{% static 'core/Imagenes/Carga.jpeg' %}" alt="Bienvenido a Pasitos al Saber" class="logo-carga">
    </div>

    <script>
        // Nota: En tu comentario decías 8s pero tenías 5000ms (5s). 
        // Lo configuré a 5 segundos en total.
        const tiempoTotal = 5000; 
        const tiempoAnimacionSalida = 800; // 0.8 segundos (coincide con el CSS)

        // 1. Iniciamos el desvanecimiento un poco antes de que termine el tiempo total
        setTimeout(function() {
            document.getElementById('loader').classList.add('fade-out');
        }, tiempoTotal - tiempoAnimacionSalida);

        // 2. Redirección automática al cumplir el tiempo total
        setTimeout(function() {
            window.location.href = "{% url 'crear_perfil' %}";
        }, tiempoTotal);
    </script>

</body>
</html>
